<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <table class="calculator">
        <tr>
            <td>
                <div id="inPut"></div>
            </td>
        </tr>
        <tr>
            <td>
                <div id="outPut">0</div>
            </td>
        </tr>
        <tr id="utilRow">
            <td>
                <button id="calc">=</button>
            </td>
            <td>
                <button id="clear">C</button>
            </td>
        </tr>
        <tr id="operatorRow">
            <td class="operator">
                <button id="add">+</button>
            </td>
            <td class="operator">
                <button id="subtract">-</button>
            </td>
            <td class="operator">
                <button id="multiply">*</button>
            </td>
            <td class="operator">
                <button id="divide">/</button>
            </td>
        </tr>
        <tr class="numRow">
            <td class="num">
                <button>7</button>
            </td>
            <td class="num">
                <button>8</button>
            </td>
            <td class="num">
                <button>9</button>
            </td>
        </tr>
        <tr class="numRow">
            <td class="num">
                <button>4</button>
            </td>
            <td class="num">
                <button>5</button>
            </td>
            <td class="num">
                <button>6</button>
            </td>
        </tr>
        <tr class="numRow">
            <td class="num">
                <button>1</button>
            </td>
            <td class="num">
                <button>2</button>
            </td>
            <td class="num">
                <button>3</button>
            </td>
        </tr>
        <tr class="numRow">
            <td class="num">
                <button>0</button>
            </td>
        </tr>
        </table>
    </table>
    <script src="script.js"></script>
</body>
</html>
